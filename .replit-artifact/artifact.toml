kind = "mobile"
previewPath = "/"
title = "Vee"
version = "1.0.0"
id = "artifacts/vee"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 21175

[services.development]
run = "pnpm --filter @workspace/vee run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vee", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/vee", "run", "serve" ]

[services.env]
PORT = "21175"
BASE_PATH = "/"
